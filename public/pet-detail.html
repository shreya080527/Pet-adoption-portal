<!DOCTYPE html>
<html lang=" en\>
<head>
<meta charset=\UTF-8\ />
<meta name=\viewport\ content=\width=device-width initial-scale=1.0\ />
<title>Pet Details — PawPath</title>
<link rel=\stylesheet\ href=\css/style.css\ />
</head>
<body>

<!-- NAV: paste your site's actual header here from pets.html so it matches -->
<header class=\site-header\>
 <div class=\container nav-inner\>
 <a href=\index.html\ class=\brand\><span class=\brand-mark\>??</span> PawPath</a>
 <nav class=\main-nav\ id=\mainNav\>
 <a href=\pets.html\>Browse Pets</a>
 <a href=\lost-found.html\>Lost &amp; Found</a>
 <a href=\resources.html\>Resources</a>
 <a href=\found-pet.html\>Report Stray</a>
 <a href=\surrender-pet.html\>Give Up a Pet</a>
 </nav>
 <div class=\nav-actions\ id=\navActions\>
 <a href=\login.html\ class=\btn btn-ghost\>Log In</a>
 <a href=\register.html\ class=\btn btn-primary\>Sign Up</a>
 </div>
 <button class=\nav-toggle\ id=\navToggle\ aria-label=\Toggle menu\>?</button>
 </div>
</header>

<main class=\container\>

 <p id=\loadingMsg\>Loading pet details...</p>

 <div id=\petDetailContent\ hidden>

 <div class=\pet-detail-grid\>

 <div class=\pet-detail-image\>
 <img id=\petImage\ src=\\ alt=\Pet photo\ />
 <span id=\petStatusBadge\ class=\badge\></span>
 </div>

 <div class=\pet-detail-info\>
 <h1 id=\petName\></h1>
 <p id=\petMeta\ class=\pet-meta\></p>
 <span id=\petOriginTag\ class=\origin-tag\></span>

 <table class=\pet-info-table\>
 <tr><td>Color</td><td id=\petColor\></td></tr>
 <tr><td>Vaccinated</td><td id=\petVaccinated\></td></tr>
 <tr><td>Neutered</td><td id=\petNeutered\></td></tr>
 <tr><td>Health Status</td><td id=\petHealthStatus\></td></tr>
 </table>

 <h3>About <span id=\petNameInline\></span></h3>
 <p id=\petDescription\></p>

 <div class=\pet-detail-actions\>
 <a id=\adoptBtn\ href=\#\ class=\btn btn-primary\>Adopt Me</a>
 <a id=\healthRecordsBtn\ href=\#\ class=\btn btn-outline\>View Health Records</a>
 </div>
 </div>

 </div>

 </div>

</main>

 <p>&copy; 2026 PawPath. All rights reserved.</p>
</footer>

<script src=\js/firebase-config.js\></script>
<script src=\js/utils.js\></script>
<script src=\js/auth.js\></script>
<script src=\js/pet-detail.js\></script>
</body>
</html>
